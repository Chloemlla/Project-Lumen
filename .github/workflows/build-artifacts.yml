name: Build artifacts and GHCR image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_SCRIPT_COMMIT: d8023efa37e5da37786642ed734b229fde3173bb
  DEPLOY_SCRIPT_SHA256: 89a4876e3952db2c01c49fd76cbbf43ce90df023f21f7a48a619f7eeced12977

jobs:
  build:
    name: Build Android APK and Rust backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Read app version
        shell: bash
        run: |
          VERSION_NAME="$(tr -d '\r' < app/application.version | sed -n '1{s/^[[:space:]]*//; s/[[:space:]]*$//; p;}')"
          VERSION_CODE="${GITHUB_RUN_NUMBER:-$(date -u +%s)}"
          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]] || [ "$VERSION_CODE" -lt 1 ]; then
            VERSION_CODE="$(date -u +%s)"
          fi
          echo "PROJECT_LUMEN_VERSION_NAME=${VERSION_NAME:-0.0.0}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS=$(date -u +%s%3N)" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_COMMIT_HASH=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_SHORT_HASH=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          KEY_ALIAS="$(printf '%s' "$KEY_ALIAS" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          if [ -f "gradle.properties" ]; then
            sed -i 's/\r$//' gradle.properties
            [ -n "$(tail -c 1 gradle.properties)" ] && echo "" >> gradle.properties
          fi

          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Release signing secrets are incomplete; using debug signing for the release APK."
            printf 'PROJECT_LUMEN_USE_DEBUG_SIGNING=true\n' >> gradle.properties
          else
            printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > "${{ github.workspace }}/project_lumen.jks" || {
              echo "Failed to decode KEYSTORE_BASE64; using debug signing for the release APK."
              printf 'PROJECT_LUMEN_USE_DEBUG_SIGNING=true\n' >> gradle.properties
              exit 0
            }

            printf 'PROJECT_LUMEN_STORE_FILE=%s\n' "${{ github.workspace }}/project_lumen.jks" >> gradle.properties
            printf 'PROJECT_LUMEN_STORE_PASSWORD=%s\n' "$KEYSTORE_PASSWORD" >> gradle.properties
            printf 'PROJECT_LUMEN_KEY_ALIAS=%s\n' "$KEY_ALIAS" >> gradle.properties
            printf 'PROJECT_LUMEN_KEY_PASSWORD=%s\n' "$KEY_PASSWORD" >> gradle.properties
          fi

      - name: Build Android release APK
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
          PROJECT_LUMEN_API_BASE_URL: ${{ vars.PROJECT_LUMEN_API_BASE_URL }}
          PROJECT_LUMEN_TELEMETRY_ACCESS_TOKEN: ${{ secrets.PROJECT_LUMEN_TELEMETRY_ACCESS_TOKEN }}
        run: gradle assembleRelease --no-daemon

      - name: Prepare Android artifact
        shell: bash
        run: |
          mkdir -p release-assets
          VERSION="${PROJECT_LUMEN_VERSION_NAME}-${PROJECT_LUMEN_SHORT_HASH}"
          APK_DIR="app/build/outputs/apk/release"
          AGGREGATED_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "app-universal-release.apk" -o -name "app-release.apk" -o -name "app-release-unsigned.apk" \) | head -n 1)"

          if [ -z "$AGGREGATED_APK" ]; then
            echo "Aggregated release APK was not found."
            ls -lh "$APK_DIR"
            exit 1
          fi

          cp "$AGGREGATED_APK" "release-assets/Project-Lumen_android_${VERSION}.apk"
          (
            cd release-assets
            sha256sum *.apk > checksums.txt
          )

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-release-apk
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Lint Rust backend
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets -- -D warnings

      - name: Build Rust backend
        run: cargo build --manifest-path backend/Cargo.toml --release

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux-x86_64
          path: backend/target/release/project-lumen-api
          if-no-files-found: error
          retention-days: 30

  publish-image:
    name: Publish GHCR image
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      deploy_image: ${{ steps.image.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          ref_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]/' '[:lower:]-' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
          short_sha="$(git rev-parse --short HEAD)"
          image="ghcr.io/${repo}"

          {
            echo "deploy_image=${image}:sha-${short_sha}"
            echo "tags<<EOF"
            echo "${image}:${ref_tag}"
            echo "${image}:sha-${short_sha}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=project-lumen-backend
          cache-to: type=gha,mode=max,scope=project-lumen-backend

  deploy-image:
    name: Deploy GHCR image
    needs: publish-image
    if: github.event_name != 'pull_request' && needs.publish-image.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check deployment configuration
        id: deploy_config
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTAINER_NAMES: ${{ secrets.CONTAINER_NAMES }}
        run: |
          if [ -n "$SERVER_ADDRESS" ] && [ -n "$USERNAME" ] && [ -n "$PRIVATE_KEY" ] && [ -n "$CONTAINER_NAMES" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote deployment skipped: SERVER_ADDRESS, USERNAME, PRIVATE_KEY, or CONTAINER_NAMES is not configured."
          fi

      - name: Install deployment dependencies
        if: steps.deploy_config.outputs.enabled == 'true'
        run: npm install --no-save --no-package-lock ssh2 dotenv axios form-data

      - name: Download deployment script
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          mkdir -p scripts
          curl -fsSL "https://raw.githubusercontent.com/Chloemlla/Happy-TTS/${DEPLOY_SCRIPT_COMMIT}/scripts/deploy_image.js" -o scripts/deploy_image.js
          echo "${DEPLOY_SCRIPT_SHA256}  scripts/deploy_image.js" | sha256sum -c -
          chmod +x scripts/deploy_image.js

      - name: Run deployment script
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PORT: ${{ secrets.PORT }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTAINER_NAMES: ${{ secrets.CONTAINER_NAMES }}
          IMAGE_URL: ${{ needs.publish-image.outputs.deploy_image }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node scripts/deploy_image.js
