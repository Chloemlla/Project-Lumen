name: Build and publish GHCR image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_SCRIPT_REF: main

jobs:
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      deploy_image: ${{ steps.image.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          image="${IMAGE_NAME,,}"
          ref_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]/' '[:lower:]-' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
          short_sha="$(git rev-parse --short HEAD)"
          package_name="${GITHUB_REPOSITORY#*/}"
          package_name="${package_name,,}"

          {
            echo "package_name=${package_name}"
            echo "deploy_image=${image}:sha-${short_sha}"
            echo "tags<<EOF"
            echo "${image}:${ref_tag}"
            echo "${image}:sha-${short_sha}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=project-lumen-image
          cache-to: type=gha,mode=max,scope=project-lumen-image
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Project Lumen container image
            org.opencontainers.image.licenses=MIT

  deploy-image:
    name: Deploy GHCR image
    needs: build-image
    if: github.event_name != 'pull_request' && needs.build-image.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check deployment configuration
        id: deploy_config
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTAINER_NAMES: ${{ secrets.CONTAINER_NAMES }}
        run: |
          if [ -n "$SERVER_ADDRESS" ] && [ -n "$USERNAME" ] && [ -n "$PRIVATE_KEY" ] && [ -n "$CONTAINER_NAMES" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote deployment skipped: SERVER_ADDRESS, USERNAME, PRIVATE_KEY, or CONTAINER_NAMES is not configured."
          fi

      - name: Install deployment dependencies
        if: steps.deploy_config.outputs.enabled == 'true'
        run: npm install --no-save --no-package-lock ssh2 dotenv axios form-data

      - name: Download deployment script
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          mkdir -p scripts
          curl -fsSL "https://raw.githubusercontent.com/Chloemlla/Happy-TTS/${DEPLOY_SCRIPT_REF}/scripts/deploy_image.js" -o scripts/deploy_image.js
          chmod +x scripts/deploy_image.js

      - name: Run deployment script
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PORT: ${{ secrets.PORT }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTAINER_NAMES: ${{ secrets.CONTAINER_NAMES }}
          IMAGE_URL: ${{ needs.build-image.outputs.deploy_image }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node scripts/deploy_image.js
