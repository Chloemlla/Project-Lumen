name: Release Project Lumen Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-android:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APK
        run: gradle assembleRelease --no-daemon

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release-assets/Project-Lumen_android_${VERSION}_unsigned.apk"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-release-apk
          path: release-assets/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: release-assets/*.apk
