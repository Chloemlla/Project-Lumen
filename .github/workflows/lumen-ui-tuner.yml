name: Lumen UI Tuner Verification

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/lumen-ui-tuner.yml"
      - "scripts/run-lumen-topbar-screenshot-test.sh"
      - "design/lumen-ui-tokens.json"
      - "tools/lumen-ui-tuner/**"
      - "app/build.gradle.kts"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenUiTokens.kt"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenSharedComponents.kt"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenMetricsAndLayout.kt"
      - "app/src/androidTest/java/com/projectlumen/app/app/LumenTopBarScreenshotTest.kt"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/lumen-ui-tuner.yml"
      - "scripts/run-lumen-topbar-screenshot-test.sh"
      - "design/lumen-ui-tokens.json"
      - "tools/lumen-ui-tuner/**"
      - "app/build.gradle.kts"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenUiTokens.kt"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenSharedComponents.kt"
      - "app/src/main/java/com/projectlumen/app/app/ProjectLumenMetricsAndLayout.kt"
      - "app/src/androidTest/java/com/projectlumen/app/app/LumenTopBarScreenshotTest.kt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Build tuner and capture Android UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.USER_PAT || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "latest"

      - name: Install tuner dependencies and build
        working-directory: tools/lumen-ui-tuner
        run: |
          npm install
          npm run build

      - name: Commit generated tuner lockfile
        if: github.event_name != 'pull_request'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/lumen-ui-tuner/package-lock.json
          git diff --cached --quiet && echo "No lockfile changes to commit" && exit 0
          git commit -m "chore: update UI tuner npm lockfile"
          for attempt in 1 2 3; do
            git fetch origin "+refs/heads/$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME"
            if git rebase "origin/$BRANCH_NAME" && git push origin "HEAD:refs/heads/$BRANCH_NAME"; then
              exit 0
            fi
            git rebase --abort || true
            if [ "$attempt" -lt 3 ]; then
              sleep 5
            fi
          done
          echo "Failed to push lockfile update after rebasing onto origin/$BRANCH_NAME" >&2
          exit 1

      - name: Upload tuner dist
        uses: actions/upload-artifact@v4
        with:
          name: lumen-ui-tuner-dist
          path: tools/lumen-ui-tuner/dist/**
          retention-days: 14

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # - name: Set up Android native toolchain
      #   uses: ./.github/actions/setup-android-native-toolchain

      - name: Read app version
        run: |
          VERSION_NAME=$(tr -d '\r' < app/application.version | sed -n '1{s/^[[:space:]]*//; s/[[:space:]]*$//; p;}')
          VERSION_CODE="${GITHUB_RUN_NUMBER:-$(date -u +%s)}"
          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]] || [ "$VERSION_CODE" -lt 1 ]; then
            VERSION_CODE="$(date -u +%s)"
          fi
          BUILD_TIME_UTC_MILLIS=$(date -u +%s%3N)
          COMMIT_HASH="${GITHUB_SHA}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "PROJECT_LUMEN_VERSION_NAME=${VERSION_NAME:-0.0.0}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS=$BUILD_TIME_UTC_MILLIS" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_SHORT_HASH=$SHORT_HASH" >> "$GITHUB_ENV"

      - name: Capture top bar screenshot
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            # Keep this entrypoint as a single command. Inline multiline control flow is unsafe
            # with android-emulator-runner because some runner versions execute script lines
            # via repeated `sh -c`, which truncates `for ... do` loops.
            chmod +x scripts/run-lumen-topbar-screenshot-test.sh
            ./scripts/run-lumen-topbar-screenshot-test.sh

      - name: Upload Android UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lumen-android-ui-artifacts
          path: |
            ui-screenshot-artifacts/**
            connected-debug-android-test-attempt-*.log
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
            build/reports/problems/**
          retention-days: 14
