name: Build project_lumen

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      build_target:
        description: "Build target platform"
        required: true
        default: "all"
        type: choice
        options:
          - windows
          - android
          - web
          - all

permissions:
  contents: write

jobs:
  build-android:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'android' || github.event.inputs.build_target == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.USER_PAT }}

      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Clean stale pub git cache
        run: rm -rf ~/.pub-cache/git/

      - name: Install dependencies
        run: flutter pub get

      - name: Write signing config
        run: |
          # Ensure gradle.properties has Unix line endings
          if [ -f "android/gradle.properties" ]; then
            sed -i 's/\r$//' android/gradle.properties
            # Ensure file ends with newline
            [ -n "$(tail -c1 android/gradle.properties)" ] && echo "" >> android/gradle.properties
          fi

          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "⚠️ Warning: KEYSTORE_BASE64 secret not set, using debug signing"
            printf 'NEXAI_USE_DEBUG_SIGNING=true\n' >> android/gradle.properties
          else
            echo "✓ Decoding keystore from secret..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/project_lumen.jks || {
              echo "❌ Error: Failed to decode KEYSTORE_BASE64, using debug signing"
              printf 'NEXAI_USE_DEBUG_SIGNING=true\n' >> android/gradle.properties
              exit 0
            }

            if [ -f "${{ github.workspace }}/project_lumen.jks" ]; then
              echo "✓ Keystore file created successfully"
              printf 'NEXAI_STORE_FILE=${{ github.workspace }}/project_lumen.jks\n' >> android/gradle.properties
              printf 'NEXAI_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}\n' >> android/gradle.properties
              printf 'NEXAI_KEY_ALIAS=${{ secrets.KEY_ALIAS }}\n' >> android/gradle.properties
              printf 'NEXAI_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}\n' >> android/gradle.properties
              echo "✓ Release signing configured"
            else
              echo "❌ Error: Keystore file not created, using debug signing"
              printf 'NEXAI_USE_DEBUG_SIGNING=true\n' >> android/gradle.properties
            fi
          fi

          echo "=== gradle.properties content (masked) ==="
          grep -v "PASSWORD\|ALIAS" android/gradle.properties || true
          echo "Has NEXAI_STORE_FILE: $(grep -c 'NEXAI_STORE_FILE' android/gradle.properties)"

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Run build.ps1 (version control)
        run: pwsh scripts/build.ps1 -Arg android

      - name: Build Android APK
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=debug_symbols/android \
            --dart-define-from-file=nexai_release.json \
            --build-number=${{ env.VERSION_CODE }}

      # - name: Build Android App Bundle
      #   run: flutter build appbundle --release --dart-define-from-file=nexai_release.json --build-number=${{ env.VERSION_CODE }}

      - name: Rename APK outputs for release
        run: |
          VERSION="${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          echo "Version: $VERSION"
          echo "=== Original APK files ==="
          ls -lh build/app/outputs/flutter-apk/

          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            if [ -f "$file" ]; then
              abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
              echo "Processing: $file -> Project-Lumen_android_${VERSION}_${abi}.apk"
              cp "$file" "build/app/outputs/flutter-apk/Project-Lumen_android_${VERSION}_${abi}.apk"
            fi
          done

          echo "=== Renamed APK files ==="
          ls -lh build/app/outputs/flutter-apk/Project-Lumen_android_*.apk

      - name: Automatic release
        if: success()
        uses: softprops/action-gh-release@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: "v${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          prerelease: false
          name: "project_lumen ${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          files: |
            build/app/outputs/flutter-apk/Project-Lumen_android_*.apk

      # - name: Rename AAB output
      #   run: |
      #     VERSION="${{ env.version }}"
      #     AAB_FILE="build/app/outputs/bundle/release/app-release.aab"
      #     if [ -f "$AAB_FILE" ]; then
      #       echo "Renaming AAB: $AAB_FILE -> Project-Lumen_android_${VERSION}.aab"
      #       cp "$AAB_FILE" "build/app/outputs/bundle/release/Project-Lumen_android_${VERSION}.aab"
      #     fi
      #
      #     echo "=== AAB files ==="
      #     ls -lh build/app/outputs/bundle/release/

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols
          path: debug_symbols/
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: project_lumen-Android-APK
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: android-outputs
          path: build/app/outputs/

      # - name: Commit generated files
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git add -A
      #     git diff --cached --quiet || git commit -m "ci: generate android build files [skip ci]"
      #     git push || true
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.USER_PAT }}

  # build-web:
  #   # if: false  # Disabled - Web build not needed
  #   if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'web' || github.event.inputs.build_target == 'all' }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #       with:
  #         token: ${{ secrets.USER_PAT }}

  #     - uses: subosito/flutter-action@main
  #       with:
  #         flutter-version: "3.41.0"
  #         channel: "stable"
  #         cache: true

  #     - name: Cache Flutter pub dependencies
  #       uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.pub-cache
  #         key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
  #         restore-keys: |
  #           ${{ runner.os }}-pub-

  #     - name: Install dependencies
  #       run: flutter pub get

  #     - name: Run build.ps1 (version control)
  #       run: pwsh scripts/build.ps1

  #     - name: Build Web
  #       run: flutter build web --release --dart-define-from-file=nexai_release.json

  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: project_lumen-Web
  #         path: build/web/
  #         retention-days: 30

  build-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'windows' || github.event.inputs.build_target == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.USER_PAT }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: "stable"
          cache: true

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Run build.ps1 (version control)
        run: pwsh scripts/build.ps1

      - name: Build Windows
        run: |
          flutter build windows --release `
            --obfuscate `
            --split-debug-info=debug_symbols\windows `
            --dart-define-from-file=nexai_release.json

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          $appVersion = "${{ env.VERSION_NAME }}"
          $releaseDir = (Resolve-Path "build\windows\x64\runner\Release").Path
          $installerDir = "build\windows\installer"
          $installerDirFull = (New-Item -ItemType Directory -Force -Path $installerDir).FullName
          $outputBase = "Project-Lumen_windows_${version}_setup"
          $exePath = Join-Path $releaseDir "project_lumen.exe"

          if (-not (Test-Path $exePath)) {
            throw "Windows executable not found: $exePath"
          }

          $issPath = Join-Path $installerDirFull "project_lumen.iss"
          @"
          #define MyAppName "Project-Lumen"
          #define MyAppExeName "project_lumen.exe"
          #define MyAppVersion "$appVersion"
          #define MyBuildVersion "$version"
          #define MyOutputBase "$outputBase"

          [Setup]
          AppId={{4F5D3C3B-20E9-4E52-8B1F-A2042D4D7F3E}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppVerName={#MyAppName} {#MyBuildVersion}
          AppPublisher=Project-Lumen
          DefaultDirName={localappdata}\Programs\Project-Lumen
          DefaultGroupName={#MyAppName}
          DisableProgramGroupPage=yes
          OutputDir=$installerDirFull
          OutputBaseFilename={#MyOutputBase}
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest
          UninstallDisplayIcon={app}\{#MyAppExeName}
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "$releaseDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#MyAppName}}"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path $issPath -Encoding UTF8

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }

          & $iscc $issPath
          $installerPath = Join-Path $installerDirFull "$outputBase.exe"
          if (-not (Test-Path $installerPath)) {
            throw "Windows installer was not created: $installerPath"
          }

          "WINDOWS_INSTALLER=$installerPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-debug-symbols
          path: debug_symbols\windows
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: project_lumen-Windows-Installer
          path: build/windows/installer/*.exe
          retention-days: 30

      - name: Automatic Windows installer release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: "v${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          prerelease: false
          name: "project_lumen ${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          files: |
            build/windows/installer/*.exe

      - uses: actions/upload-artifact@v4
        with:
          name: project_lumen-Windows
          path: build/windows/x64/runner/Release/
          retention-days: 30
