name: Build Project Lumen Android

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android Gradle build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # - name: Set up Android native toolchain
      #   uses: ./.github/actions/setup-android-native-toolchain

      - name: Read app version
        run: |
          VERSION_NAME=$(tr -d '\r' < app/application.version | sed -n '1{s/^[[:space:]]*//; s/[[:space:]]*$//; p;}')
          VERSION_CODE="${GITHUB_RUN_NUMBER:-$(date -u +%s)}"
          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]] || [ "$VERSION_CODE" -lt 1 ]; then
            VERSION_CODE="$(date -u +%s)"
          fi
          BUILD_TIME_UTC_MILLIS=$(date -u +%s%3N)
          COMMIT_HASH="${GITHUB_SHA}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "PROJECT_LUMEN_VERSION_NAME=${VERSION_NAME:-0.0.0}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS=$BUILD_TIME_UTC_MILLIS" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
          echo "PROJECT_LUMEN_SHORT_HASH=$SHORT_HASH" >> "$GITHUB_ENV"

      - name: Write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          KEY_ALIAS="$(printf '%s' "${KEY_ALIAS:-}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          KEYSTORE_PASSWORD="$(printf '%s' "${KEYSTORE_PASSWORD:-}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          KEY_PASSWORD="$(printf '%s' "${KEY_PASSWORD:-}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          KEYSTORE_BASE64="$(printf '%s' "${KEYSTORE_BASE64:-}" | tr -d '[:space:]')"

          echo "=== Release signing secret presence (values redacted) ==="
          echo "KEYSTORE_BASE64 present: $([ -n "$KEYSTORE_BASE64" ] && echo yes || echo no)"
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "KEYSTORE_PASSWORD present: $([ -n "$KEYSTORE_PASSWORD" ] && echo yes || echo no)"
          echo "KEY_ALIAS present: $([ -n "$KEY_ALIAS" ] && echo yes || echo no)"
          echo "KEY_ALIAS value: ${KEY_ALIAS:-<empty>}"
          echo "KEY_PASSWORD present: $([ -n "$KEY_PASSWORD" ] && echo yes || echo no)"

          if [ -f "gradle.properties" ]; then
            sed -i 's/\r$//' gradle.properties
            sed -i '/^PROJECT_LUMEN_USE_DEBUG_SIGNING=/d' gradle.properties
            sed -i '/^PROJECT_LUMEN_STORE_FILE=/d' gradle.properties
            sed -i '/^PROJECT_LUMEN_STORE_PASSWORD=/d' gradle.properties
            sed -i '/^PROJECT_LUMEN_KEY_ALIAS=/d' gradle.properties
            sed -i '/^PROJECT_LUMEN_KEY_PASSWORD=/d' gradle.properties
            [ -n "$(tail -c 1 gradle.properties)" ] && echo "" >> gradle.properties
          fi

          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are incomplete. Required repository secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD."
            exit 1
          fi

          KEYSTORE_PATH="${{ github.workspace }}/project_lumen.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Failed to decode KEYSTORE_BASE64 into a non-empty keystore file."
            exit 1
          fi

          echo "Decoded keystore path: $KEYSTORE_PATH"
          echo "Decoded keystore size bytes: $(wc -c < "$KEYSTORE_PATH")"

          if ! keytool -list -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/tmp/keystore-alias.txt 2>/tmp/keystore-alias.err; then
            echo "::error::Keystore validation failed for alias '$KEY_ALIAS'."
            cat /tmp/keystore-alias.err
            exit 1
          fi

          echo "=== Keystore alias validation ==="
          cat /tmp/keystore-alias.txt

          CERT_SHA256="$(keytool -exportcert -alias "$KEY_ALIAS" -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | openssl dgst -sha256 -hex | awk '{print toupper($2)}')"
          CERT_SHA256_COLON="$(printf '%s' "$CERT_SHA256" | sed 's/../&:/g; s/:$//')"
          echo "Release cert SHA-256: $CERT_SHA256"
          echo "Release cert SHA-256 (colon): $CERT_SHA256_COLON"
          echo "PROJECT_LUMEN_RELEASE_CERT_SHA256=${CERT_SHA256}" >> "$GITHUB_ENV"

          printf 'PROJECT_LUMEN_STORE_FILE=%s\n' "$KEYSTORE_PATH" >> gradle.properties
          printf 'PROJECT_LUMEN_STORE_PASSWORD=%s\n' "$KEYSTORE_PASSWORD" >> gradle.properties
          printf 'PROJECT_LUMEN_KEY_ALIAS=%s\n' "$KEY_ALIAS" >> gradle.properties
          printf 'PROJECT_LUMEN_KEY_PASSWORD=%s\n' "$KEY_PASSWORD" >> gradle.properties

          echo "=== gradle.properties signing keys (passwords redacted) ==="
          grep -E '^PROJECT_LUMEN_(STORE_FILE|KEY_ALIAS)=' gradle.properties || true
          grep -E '^PROJECT_LUMEN_(STORE_PASSWORD|KEY_PASSWORD)=' gradle.properties | sed 's/=.*/=<redacted>/' || true
          echo "Release signing configured with repository secrets."

      - name: Enable Android emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate release baseline profile
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
        run: |
          # Always use release signing. Never fall back to debug signing.
          if [ -f gradle.properties ]; then
            sed -i 's/\r$//' gradle.properties
            sed -i '/^PROJECT_LUMEN_USE_DEBUG_SIGNING=/d' gradle.properties
          fi
          if ! grep -q '^PROJECT_LUMEN_STORE_FILE=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_STORE_PASSWORD=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_KEY_ALIAS=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_KEY_PASSWORD=' gradle.properties; then
            echo "::error::Release signing properties missing before baseline profile generation."
            exit 1
          fi
          gradle :app:generateBaselineProfile --no-daemon --warning-mode all

      - name: Build release APK
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
          PROJECT_LUMEN_API_BASE_URL: ${{ secrets.PROJECT_LUMEN_API_BASE_URL }}
          PROJECT_LUMEN_API_CERTIFICATE_PINNING_ENABLED: ${{ secrets.PROJECT_LUMEN_API_CERTIFICATE_PINNING_ENABLED }}
          PROJECT_LUMEN_API_CERTIFICATE_PINS: ${{ secrets.PROJECT_LUMEN_API_CERTIFICATE_PINS }}
          PROJECT_LUMEN_TRANSLATION_API_BASE_URL: ${{ secrets.PROJECT_LUMEN_TRANSLATION_API_BASE_URL }}
          PROJECT_LUMEN_TRANSLATION_CERTIFICATE_PINNING_ENABLED: ${{ secrets.PROJECT_LUMEN_TRANSLATION_CERTIFICATE_PINNING_ENABLED }}
          PROJECT_LUMEN_TRANSLATION_CERTIFICATE_PINS: ${{ secrets.PROJECT_LUMEN_TRANSLATION_CERTIFICATE_PINS }}
          PROJECT_LUMEN_TELEMETRY_ACCESS_TOKEN: ${{ secrets.PROJECT_LUMEN_TELEMETRY_ACCESS_TOKEN }}
          PROJECT_LUMEN_REQUEST_SIGNING_SECRET: ${{ secrets.PROJECT_LUMEN_REQUEST_SIGNING_SECRET }}
          PROJECT_LUMEN_RELEASE_CERT_SHA256: ${{ secrets.PROJECT_LUMEN_RELEASE_CERT_SHA256 || env.PROJECT_LUMEN_RELEASE_CERT_SHA256 }}
          PROJECT_LUMEN_OPEN_API_TRUSTED_SIGNATURE_SHA256: ${{ secrets.PROJECT_LUMEN_OPEN_API_TRUSTED_SIGNATURE_SHA256 }}
        run: |
          set -euo pipefail
          if [ -f gradle.properties ]; then
            sed -i '/^PROJECT_LUMEN_USE_DEBUG_SIGNING=/d' gradle.properties
          fi
          if ! grep -q '^PROJECT_LUMEN_STORE_FILE=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_STORE_PASSWORD=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_KEY_ALIAS=' gradle.properties || \
             ! grep -q '^PROJECT_LUMEN_KEY_PASSWORD=' gradle.properties; then
            echo "::error::Release signing properties missing before assembleRelease."
            exit 1
          fi
          echo "=== Signing properties before assembleRelease (passwords redacted) ==="
          grep -E '^PROJECT_LUMEN_(STORE_FILE|KEY_ALIAS)=' gradle.properties || true
          grep -E '^PROJECT_LUMEN_(STORE_PASSWORD|KEY_PASSWORD)=' gradle.properties | sed 's/=.*/=<redacted>/' || true
          gradle :app:assembleRelease --no-daemon --warning-mode all

      - name: Inspect APK signing
        run: |
          set -euo pipefail
          APK_DIR="app/build/outputs/apk/release"
          echo "=== Release APK outputs ==="
          ls -lh "$APK_DIR" || true

          mapfile -t APKS < <(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | sort)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No release APKs found for signature inspection."
            exit 1
          fi

          SDK_ROOTS=()
          [ -n "${ANDROID_HOME:-}" ] && SDK_ROOTS+=("$ANDROID_HOME")
          [ -n "${ANDROID_SDK_ROOT:-}" ] && SDK_ROOTS+=("$ANDROID_SDK_ROOT")
          SDK_ROOTS+=("/usr/local/lib/android/sdk" "$HOME/Android/Sdk" "$HOME/.android/sdk")
          APKSIGNER=""
          for sdk in "${SDK_ROOTS[@]}"; do
            if [ -d "$sdk/build-tools" ]; then
              ANDROID_BUILD_TOOLS="$(ls -d "$sdk"/build-tools/* 2>/dev/null | sort -V | tail -n 1 || true)"
              if [ -n "$ANDROID_BUILD_TOOLS" ] && [ -x "$ANDROID_BUILD_TOOLS/apksigner" ]; then
                APKSIGNER="$ANDROID_BUILD_TOOLS/apksigner"
                echo "Using apksigner: $APKSIGNER"
                break
              fi
            fi
          done
          if [ -z "$APKSIGNER" ] && command -v apksigner >/dev/null 2>&1; then
            APKSIGNER="$(command -v apksigner)"
            echo "Using apksigner from PATH: $APKSIGNER"
          fi

          for apk in "${APKS[@]}"; do
            echo "============================================================"
            echo "APK: $apk"
            echo "Size bytes: $(wc -c < "$apk")"
            echo "SHA-256: $(sha256sum "$apk" | awk '{print $1}')"

            if [ -n "$APKSIGNER" ]; then
              echo "--- apksigner verify --print-certs --verbose ---"
              "$APKSIGNER" verify --print-certs --verbose "$apk" || {
                echo "::error::apksigner verification failed for $apk"
                exit 1
              }
            else
              echo "apksigner not found; falling back to jarsigner/keytool inspection."
            fi

            echo "--- jarsigner -verify -verbose -certs ---"
            jarsigner -verify -verbose -certs "$apk" | sed -n '1,120p' || true

            unzip -p "$apk" META-INF/*.RSA META-INF/*.DSA META-INF/*.EC 2>/dev/null | openssl pkcs7 -inform DER -print_certs 2>/dev/null | openssl x509 -noout -fingerprint -sha256 -subject -issuer 2>/dev/null || true
          done

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ env.PROJECT_LUMEN_VERSION_NAME }}-${{ env.PROJECT_LUMEN_SHORT_HASH }}"
          APK_DIR="app/build/outputs/apk/release"
          AGGREGATED_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "app-universal-release.apk" -o -name "app-release.apk" -o -name "app-release-unsigned.apk" \) | head -n 1)"

          if [ -z "$AGGREGATED_APK" ]; then
            echo "Aggregated release APK was not found."
            ls -lh "$APK_DIR"
            exit 1
          fi

          cp "$AGGREGATED_APK" "release-assets/Project-Lumen_android_${VERSION}.apk"

          for variant in armeabi-v7a arm64-v8a x86 x86_64; do
            VARIANT_APK="$(find "$APK_DIR" -maxdepth 1 -type f -name "app-${variant}-release.apk" | head -n 1)"
            if [ -n "$VARIANT_APK" ]; then
              cp "$VARIANT_APK" "release-assets/Project-Lumen_android_${VERSION}_${variant}.apk"
            fi
          done

          (
            cd release-assets
            sha256sum *.apk > checksums.txt
          )

          TAG_NAME="v${VERSION}"
          RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"
          python3 - "$VERSION" "${{ env.PROJECT_LUMEN_VERSION_CODE }}" "$TAG_NAME" "$RELEASE_BASE_URL" "${GITHUB_REPOSITORY}" <<'PY'
          import json
          import pathlib
          import sys

          version_name, version_code, tag_name, release_base_url, repository = sys.argv[1:6]
          asset_dir = pathlib.Path("release-assets")
          checksums = {}
          for line in (asset_dir / "checksums.txt").read_text(encoding="utf-8").splitlines():
              parts = line.split()
              if len(parts) >= 2:
                  checksums[pathlib.Path(parts[-1]).name] = parts[0].lower()

          def abi_for(name):
              for abi in ("armeabi-v7a", "arm64-v8a", "x86", "x86_64"):
                  if name.endswith(f"_{abi}.apk"):
                      return abi
              return "universal"

          assets = []
          for apk in sorted(asset_dir.glob("*.apk")):
              name = apk.name
              assets.append({
                  "abi": abi_for(name),
                  "name": name,
                  "url": f"{release_base_url}/{name}",
                  "sha256": checksums[name],
                  "sizeBytes": apk.stat().st_size,
                  "contentType": "application/vnd.android.package-archive",
              })

          primary = next((asset for asset in assets if asset["abi"] == "universal"), assets[0])
          manifest = {
              "schemaVersion": 1,
              "versionCode": int(version_code),
              "versionName": version_name,
              "tagName": tag_name,
              "channel": "stable",
              "rollout": "100%",
              "forceUpdate": False,
              "releaseUrl": f"https://github.com/{repository}/releases/tag/{tag_name}",
              "sha256": primary["sha256"],
              "fullApkUrl": primary["url"],
              "fullApkSha256": primary["sha256"],
              "fullApkSizeBytes": primary["sizeBytes"],
              "assets": assets,
              "patches": [],
          }
          (asset_dir / "release-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Automatic release
        if: success() && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: "v${{ env.PROJECT_LUMEN_VERSION_NAME }}-${{ env.PROJECT_LUMEN_SHORT_HASH }}"
          prerelease: false
          name: "Project-Lumen ${{ env.PROJECT_LUMEN_VERSION_NAME }}-${{ env.PROJECT_LUMEN_SHORT_HASH }}"
          files: release-assets/*

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-release-apk
          path: release-assets/*
          retention-days: 30

      - name: Sync release manifest to backend
        if: success() && github.event_name != 'pull_request'
        env:
          PROJECT_LUMEN_API_BASE_URL: ${{ secrets.PROJECT_LUMEN_API_BASE_URL }}
          PROJECT_LUMEN_ADMIN_ACTIONS_URL: ${{ secrets.PROJECT_LUMEN_ADMIN_ACTIONS_URL }}
          PROJECT_LUMEN_ADMIN_TOKEN: ${{ secrets.PROJECT_LUMEN_ADMIN_TOKEN }}
        run: |
          if [ -z "$PROJECT_LUMEN_ADMIN_TOKEN" ]; then
            echo "Backend release sync skipped; PROJECT_LUMEN_ADMIN_TOKEN is not configured."
            exit 0
          fi
          if [ -z "$PROJECT_LUMEN_API_BASE_URL" ] && [ -z "$PROJECT_LUMEN_ADMIN_ACTIONS_URL" ]; then
            echo "Backend release sync skipped; PROJECT_LUMEN_API_BASE_URL or PROJECT_LUMEN_ADMIN_ACTIONS_URL is not configured."
            exit 0
          fi
          ADMIN_ACTIONS_URL="${PROJECT_LUMEN_ADMIN_ACTIONS_URL%/}"
          if [ -z "$ADMIN_ACTIONS_URL" ]; then
            API_BASE="${PROJECT_LUMEN_API_BASE_URL%/}"
            case "$API_BASE" in
              */api) ADMIN_ACTIONS_URL="${API_BASE}/admin/actions" ;;
              *) ADMIN_ACTIONS_URL="${API_BASE}/api/admin/actions" ;;
            esac
          fi
          python3 - <<'PY'
          import json
          import pathlib

          manifest_path = pathlib.Path("release-assets/release-manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload = {"action": "force-update", "payload": manifest}
          pathlib.Path("release-assets/backend-release-action.json").write_text(
              json.dumps(payload, ensure_ascii=False, separators=(",", ":")),
              encoding="utf-8",
          )
          PY
          curl -fsS \
            -H "Authorization: Bearer ${PROJECT_LUMEN_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @release-assets/backend-release-action.json \
            "$ADMIN_ACTIONS_URL"

      - name: Run state machine unit tests
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
        run: gradle testDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          PROJECT_LUMEN_VERSION_NAME: ${{ env.PROJECT_LUMEN_VERSION_NAME }}
          PROJECT_LUMEN_VERSION_CODE: ${{ env.PROJECT_LUMEN_VERSION_CODE }}
          PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS: ${{ env.PROJECT_LUMEN_BUILD_TIME_UTC_MILLIS }}
          PROJECT_LUMEN_COMMIT_HASH: ${{ env.PROJECT_LUMEN_COMMIT_HASH }}
          PROJECT_LUMEN_SHORT_HASH: ${{ env.PROJECT_LUMEN_SHORT_HASH }}
        run: gradle lintDebug --no-daemon --warning-mode all

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-verification-reports
          path: |
            app/build/reports/tests/**
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            build/reports/problems/**
          retention-days: 14

  backend:
    name: Rust backend verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build admin dashboard
        working-directory: backend/admin
        run: |
          npm install
          npm run build

      - name: Upload admin dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-admin-dashboard
          path: backend/admin/dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check Rust formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Run Rust tests
        run: cargo test --manifest-path backend/Cargo.toml --all-targets
